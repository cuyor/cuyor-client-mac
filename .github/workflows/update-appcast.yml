name: Update Appcast for Sparkle

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: true
        type: string
      download_url:
        description: 'Download URL for app artifact (.zip or .dmg)'
        required: true
        type: string
      file_size:
        description: 'File size in bytes (optional, auto-detected if blank)'
        required: false
        type: string

jobs:
  update-appcast:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Extract release information
        id: release_info
        run: |
          # Use manual input if workflow_dispatch, otherwise use release event
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            RELEASE_TAG="${{ github.event.inputs.release_tag }}"
            DOWNLOAD_URL="${{ github.event.inputs.download_url }}"
            FILE_SIZE="${{ github.event.inputs.file_size }}"
            RELEASE_NOTES_URL=""
          else
            RELEASE_TAG="${{ github.event.release.tag_name }}"
            DOWNLOAD_URL=""
            FILE_SIZE=""
            RELEASE_NOTES_URL="${{ github.event.release.html_url }}"
          fi

          VERSION="${RELEASE_TAG#v}"  # Remove 'v' prefix if present
          SHORT_VERSION="$VERSION"
          
          # If running from release event, extract asset info
          if [[ -z "$DOWNLOAD_URL" ]]; then
            for asset in $(echo '${{ toJson(github.event.release.assets) }}' | jq -r '.[] | @base64'); do
              asset_json=$(echo "$asset" | base64 -d)
              asset_name=$(echo "$asset_json" | jq -r '.name')
              
              if [[ "$asset_name" == *.zip || "$asset_name" == *.dmg ]]; then
                DOWNLOAD_URL=$(echo "$asset_json" | jq -r '.browser_download_url')
                FILE_SIZE=$(echo "$asset_json" | jq -r '.size')
                break
              fi
            done
          fi

          if [[ -z "$FILE_SIZE" ]] || [[ "$FILE_SIZE" == "" ]]; then
            FILE_SIZE=0
          fi
          
          if [ -z "$DOWNLOAD_URL" ]; then
            echo "No download URL provided or asset found in release"
            exit 1
          fi
          
          echo "release_tag=$RELEASE_TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "short_version=$SHORT_VERSION" >> $GITHUB_OUTPUT
          echo "download_url=$DOWNLOAD_URL" >> $GITHUB_OUTPUT
          echo "file_size=$FILE_SIZE" >> $GITHUB_OUTPUT
          echo "release_notes_url=$RELEASE_NOTES_URL" >> $GITHUB_OUTPUT
      
      - name: Run generate_appcast.py
        run: |
          python scripts/generate_appcast.py \
            "${{ steps.release_info.outputs.release_tag }}" \
            "${{ steps.release_info.outputs.version }}" \
            "${{ steps.release_info.outputs.short_version }}" \
            "${{ steps.release_info.outputs.download_url }}" \
            "${{ steps.release_info.outputs.file_size }}" \
            "${{ steps.release_info.outputs.release_notes_url }}"
      
      - name: Commit and push appcast.xml
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"

          # Fetch and checkout the actual branch — release events checkout a detached HEAD
          git fetch origin "$DEFAULT_BRANCH"
          git checkout "$DEFAULT_BRANCH"

          if [[ -n $(git status -s appcast.xml) ]]; then
            git add appcast.xml
            git commit -m "chore: update appcast for release ${{ steps.release_info.outputs.release_tag }}"
            git push origin "HEAD:${DEFAULT_BRANCH}"
          else
            echo "No changes to appcast.xml"
          fi
      
      - name: Upload appcast.xml to release assets
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: appcast.xml
          tag_name: ${{ github.event.release.tag_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
